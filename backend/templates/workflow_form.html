{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Workflow | NexusFlow{% endblock %}
{% block page_title %}{% if editing %}Edit Workflow{% else %}New Workflow{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Trigger</label>
        <select name="trigger">
          <option value="manual" {% if record.trigger == 'manual' %}selected{% endif %}>Manual</option>
          <option value="scheduled" {% if record.trigger == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="event" {% if record.trigger == 'event' %}selected{% endif %}>Event</option>
          <option value="webhook" {% if record.trigger == 'webhook' %}selected{% endif %}>Webhook</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Steps Count</label>
        <input type="number" name="steps_count" value="{{ record.steps_count|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Runs</label>
        <input type="number" name="runs" value="{{ record.runs|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Last Run</label>
        <input type="date" name="last_run" value="{{ record.last_run|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Workflow</button>
      <a href="/workflows/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
